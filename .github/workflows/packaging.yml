name: Build
on:
  push:
    tags:
      - "[0-9]+\\.[0-9]+\\.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Archive
        run: |
          pnpm install
          pnpm run build:firefox
          cp ./dist/twitter_ui_customizer-*.zip ./Twitter_UI_Customizer_Firefox.xpi
          cp ./dist/index.js ./codeToDebug.js
      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: Twitter_UI_Customizer_Firefox
          path: Twitter_UI_Customizer_Firefox.xpi
      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: codeToDebug
          path: codeToDebug.js

  build-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Archive
        run: |
          pnpm install
          pnpm run build:chromium
          cp ./dist/twitter_ui_customizer-*.zip ./Twitter_UI_Customizer_Chromium.zip
      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: Twitter_UI_Customizer_Chromium
          path: Twitter_UI_Customizer_Chromium.zip

  build-chromium-crx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - name: Archive
        run: |
          pnpm install
          pnpm exec vite build --mode chromiumCRX
        env:
          GITHUB_REPO: ${{ github.repository }}
      - name: CRX
        run: |
          node ./scripts/generate-crx.ts
        env:
          GITHUB_REPO: ${{ github.repository }}
          CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}
      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: Twitter_UI_Customizer_Chromium_crx
          path: Twitter_UI_Customizer_Chromium.crx
      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: crxupdate
          path: crxupdate.xml

  make-release:
    if: github.ref_type == 'tag'
    needs: [build-firefox, build-chromium, build-chromium-crx]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: loadFile
        uses: actions/download-artifact@v8
        with:
          pattern: Twitter_UI_Customizer_*
          merge-multiple: true
      - name: loadFile
        uses: actions/download-artifact@v8
        with:
          name: crxupdate
      - name: loadFile
        uses: actions/download-artifact@v8
        with:
          name: codeToDebug
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Twitter UI Customizer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            Twitter_UI_Customizer_Firefox.xpi
            Twitter_UI_Customizer_Chromium.zip
            Twitter_UI_Customizer_Chromium.crx
            crxupdate.xml
            codeToDebug.js
